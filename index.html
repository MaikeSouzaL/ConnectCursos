<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0B" />
    <meta name="description" content="Conect Cursos — gestão de alunos, turmas, presença por QR, salas e financeiro. Conectada ao seu futuro." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Conect" />
    <title>Conect Cursos</title>
    <script>
      // Evita flash de tema: aplica o tema salvo antes da hidratação (dark-first).
      (function () {
        try {
          var stored = localStorage.getItem('conect-theme');
          var isDark = stored ? stored === 'dark' : true;
          document.documentElement.classList.toggle('dark', isDark);
          document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
